<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Food Economics Exam Trainer</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Food Economics</p>
        <h1 id="appTitle">Allenatore Esame</h1>
      </div>
      <div class="header-actions">
        <div class="language-switch" aria-label="Lingua interfaccia">
          <button class="language-button active" data-language="it">IT</button>
          <button class="language-button" data-language="en">EN</button>
        </div>
        <button class="icon-button" id="resetProgress" title="Azzera progressi" aria-label="Azzera progressi">
          <span aria-hidden="true">R</span>
        </button>
      </div>
    </header>

    <main>
      <section class="stats-grid" id="statsGrid" aria-label="Progressi salvati">
        <div class="stat">
          <span class="stat-label" id="seenLabel">Domande viste</span>
          <strong id="seenCount">0</strong>
        </div>
        <div class="stat">
          <span class="stat-label" id="accuracyLabel">Precisione</span>
          <strong id="accuracyRate">0%</strong>
        </div>
        <div class="stat">
          <span class="stat-label" id="weakTopicLabel">Argomento debole</span>
          <strong id="weakTopic">Nessuno</strong>
        </div>
      </section>

      <nav class="mode-tabs" id="modeTabs" aria-label="Modalità di studio">
        <button class="tab active" data-mode="past">Domande passate</button>
        <button class="tab" data-mode="agro">Domande AGRO</button>
        <button class="tab" data-mode="mixed">Allenamento misto</button>
        <button class="tab" data-mode="exam">Simulazione esame</button>
        <button class="tab" data-mode="review">Errori</button>
      </nav>

      <section class="toolbar">
        <div>
          <h2 id="modeTitle">Past Exam Questions</h2>
          <p id="modeDescription">Practice questions taken from previous written exams.</p>
        </div>
        <button class="primary-button" id="newSession">Nuova sessione</button>
      </section>

      <section class="exam-strip hidden" id="examStrip" aria-label="Punteggio esame">
        <div>
          <span id="scoreLabel">Punteggio</span>
          <strong id="liveScore">0/33</strong>
        </div>
        <div>
          <span id="correctLabel">Corrette</span>
          <strong id="liveCorrect">0/11</strong>
        </div>
        <div>
          <span id="statusLabel">Stato</span>
          <strong id="liveStatus">In corso</strong>
        </div>
      </section>

      <section class="quiz-panel" id="quizPanel">
        <div class="question-meta">
          <span id="questionCounter">Question 1</span>
          <span id="questionTopic">Basics</span>
        </div>
        <h3 id="questionText"></h3>
        <div class="answers" id="answers"></div>
        <div class="feedback hidden" id="feedback"></div>
        <div class="quiz-actions">
          <button class="ghost-button" id="infoButton" title="Mostra spiegazione" aria-label="Mostra spiegazione">i</button>
          <button class="secondary-button" id="nextQuestion">Avanti</button>
        </div>
        <p class="explanation hidden" id="explanation"></p>
      </section>

      <section class="results-panel hidden" id="resultsPanel">
        <h2 id="resultsTitle">Sessione completata</h2>
        <p id="resultsText"></p>
        <div class="result-score" id="resultScore"></div>
        <button class="primary-button" id="restartAfterResults">Riprova</button>
      </section>
    </main>

    <script src="questions.js"></script>
    <script src="agro-questions.js"></script>
    <script src="app.js"></script>
  </body>
</html>
